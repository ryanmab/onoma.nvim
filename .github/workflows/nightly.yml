on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "7 7 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

name: Nightly

defaults:
  run:
    working-directory: ./bridge

jobs:
  nightly:
    runs-on: ubuntu-latest
    name: Build (nightly)
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: cargo check
        run: cargo check

  update:
    runs-on: ubuntu-latest
    name: Update (beta / updated)
    steps:
      - uses: actions/checkout@v6

      - name: Install beta
        uses: dtolnay/rust-toolchain@beta

      - name: cargo update
        run: cargo update

      - name: cargo check
        run: cargo check
